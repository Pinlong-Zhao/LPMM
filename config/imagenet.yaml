# ImageNet Configuration for LPMM

# Dataset settings
dataset: 'imagenet'
num_classes: 1000
image_size: 224
data_path: './data/imagenet'

# Distillation settings
ipc: 10  # Images per class

# Multi-Descriptor Consensus
descriptors:
  - 'training_loss'
  - 'prediction_depth'
  - 'forgetting_extent'
  - 'uncertainty'
  - 'gradient_norm'

weights: 'ewm'

# Information Purification
latent_dim_R: 512
latent_dim_I: 256
alpha: 0.5
beta: 0.3

# Network architecture
encoder_hidden_dims: [2048, 1024, 512]
decoder_hidden_dims: [512, 1024, 2048]
classifier_hidden_dim: 512

# Training hyperparameters
epochs: 2000
batch_size: 64
lr: 0.0001
optimizer: 'adam'
weight_decay: 0.0001

# Learning rate schedule
lr_schedule: 'cosine'
warmup_epochs: 50

# Evaluation
eval_interval: 50
save_interval: 200

# Paths
checkpoint_dir: './checkpoints'
log_dir: './logs'
output_dir: './outputs'

# Device
gpu: '0,1,2,3'
num_workers: 8
seed: 42
distributed: true
